name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check the engine
        run: node --check src/liquid-glass.js

      - name: Verify required assets exist
        run: |
          test -f src/liquid-glass.css
          test -f examples/index.html
          test -f README.md
          test -f LICENSE
          echo "All required assets present."

      - name: Prettier format check
        run: npx --yes prettier@3 --check "src/**/*.{js,css}" "examples/**/*.html"
