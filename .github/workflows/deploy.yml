name: Deploy demo to GitHub Pages

# Publishes the interactive playground (examples/) so the live demo URL
# in the README always reflects `main`.
#
# One-time setup: Repo → Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site (examples + src)
        run: |
          mkdir -p _site/src
          cp -r src _site/
          cp -r examples _site/
          # Redirect the site root to the playground.
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=./examples/">' > _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
